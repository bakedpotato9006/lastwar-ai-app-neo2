name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Java指定（重要）
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # キャッシュクリア
      - run: flutter clean

      - run: flutter pub get

      - run: flutter build apk --release
